# docker-compose.yml — CAS production stack (VPS)
#
# Usage on VPS:
#   cd /opt/apps/cas
#   cp .env.example .env && $EDITOR .env
#   docker compose up -d

services:
  cas-backend:
    image: ghcr.io/cfxdevkit/cfxdevkit/cas-backend:${TAG:-edge}
    container_name: cas-backend
    restart: unless-stopped
    # Only accessible via Caddy — not exposed to the public internet.
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      HOST: "0.0.0.0"
      CAS_API_KEY: "${CAS_API_KEY}"
      CORS_ORIGIN: "${CORS_ORIGIN:-https://cas.cfxdevkit.org}"  # CAS frontend on Vercel
    volumes:
      - cas-data:/app/data
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get('http://localhost:3001/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  cas-data:
    driver: local
