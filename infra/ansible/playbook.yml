---
# Main provisioning playbook for the cfxdevkit VPS
#
# Bootstrap (first time — fresh VPS, only root exists):
#   ansible-playbook playbook.yml -i inventory.local.ini -e @vars/local.yml \
#     -e ansible_user=root \
#     -e ansible_ssh_private_key_file=~/.ssh/id_rsa
#   NOTE: -u/--user and --private-key are NOT enough — inventory host vars have
#   higher precedence. Override both with -e (extra vars beat host vars).
#   ansible_ssh_common_args has IdentitiesOnly=yes so only the named key is tried.
#
# All subsequent runs (root SSH is disabled after base role runs):
#   ansible-playbook playbook.yml -i inventory.local.ini -e @vars/local.yml
#
# Run a single role:
#   ansible-playbook playbook.yml -i inventory.local.ini --tags caddy

- name: Provision cfxdevkit VPS
  hosts: vps
  become: true

  vars_files:
    - vars/all.yml

  roles:
    - role: base
      tags: [base, security]

    - role: docker
      tags: [docker]

    - role: caddy
      tags: [caddy]

    - role: backups
      tags: [backups]

    - role: monitoring
      tags: [monitoring]

    - role: cas
      tags: [cas]

    - role: template
      tags: [template]
