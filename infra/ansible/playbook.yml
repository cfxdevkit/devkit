---
# Main provisioning playbook for the cfxdevkit VPS
#
# Bootstrap (first time — fresh VPS, only root exists):
#   ansible-playbook playbook.yml -i inventory.local.ini -e @vars/local.yml -u root
#   (inventory has ansible_user=deploy, so -u root overrides it for this run only)
#
# All subsequent runs (deploy user is set up, root SSH is disabled):
#   ansible-playbook playbook.yml -i inventory.local.ini -e @vars/local.yml
#
# Run a single role:
#   ansible-playbook playbook.yml -i inventory.local.ini --tags caddy

- name: Provision cfxdevkit VPS
  hosts: vps
  become: true

  vars_files:
    - vars/all.yml

  roles:
    - role: base
      tags: [base, security]

    - role: docker
      tags: [docker]

    - role: caddy
      tags: [caddy]

    - role: backups
      tags: [backups]

    - role: monitoring
      tags: [monitoring]

    - role: cas
      tags: [cas]

    - role: template
      tags: [template]
