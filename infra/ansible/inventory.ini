[vps]
# TODO: replace <VPS_IP> with the Hetzner public IPv4 (Hetzner Cloud Console → server → "Public IP").
#
# Bootstrap run (first time, as root — before the deploy user exists):
#   ansible-playbook playbook.yml -i inventory.local.ini -e @vars/local.yml
#
# All subsequent runs (root SSH is disabled after first run):
#   ansible-playbook playbook.yml -i inventory.local.ini -e @vars/local.yml -u deploy

<VPS_IP> ansible_user=root ansible_ssh_private_key_file=~/.ssh/id_rsa
